name: Publish to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight to update packages
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      data_changed: ${{ steps.detect-changes.outputs.data_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore RhinoPackages.sln

      - name: Run backend unit tests
        run: dotnet test RhinoPackages.Tests/RhinoPackages.Tests.csproj --configuration Release --no-restore

      - name: Run Backend Generator
        working-directory: ./RhinoPackages.Generator
        run: dotnet run

      - name: Detect data changes
        id: detect-changes
        run: |
          if git diff --quiet -- RhinoPackages.Web/public/data.json RhinoPackages.Web/public/data/versions; then
            echo "data_changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in generated API data files"
          else
            echo "data_changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in generated API data files"
          fi

      - name: Commit and Push generated API data files
        if: steps.detect-changes.outputs.data_changed == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A RhinoPackages.Web/public/data.json RhinoPackages.Web/public/data/versions
          git commit -m "chore: update package data"
          git push

  build-and-deploy:
    needs: update-data
    if: (github.event_name != 'push' || github.actor != 'github-actions[bot]') && (github.event_name != 'schedule' || needs.update-data.outputs.data_changed == 'true')
    runs-on: ubuntu-latest
    outputs:
      structural_changed: ${{ steps.detect-structural-changes.outputs.structural_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main # Ensure we get the latest commit with data.json

      - name: Detect structural changes for release
        id: detect-structural-changes
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            changed_files="$(git diff --name-only HEAD~1 HEAD)"
          else
            changed_files="$(git ls-tree -r --name-only HEAD)"
          fi

          echo "Changed files:"
          echo "$changed_files"

          structural_changed="false"
          while IFS= read -r file; do
            [ -z "$file" ] && continue

            if [[ "$file" == "RhinoPackages.Web/public/data.json" ]]; then
              continue
            fi

            if [[ "$file" == RhinoPackages.Web/public/data/versions/*.json ]]; then
              continue
            fi

            structural_changed="true"
            break
          done <<< "$changed_files"

          echo "structural_changed=$structural_changed" >> "$GITHUB_OUTPUT"
          echo "Structural changes detected: $structural_changed"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: RhinoPackages.Web/package-lock.json

      - name: Install dependencies
        working-directory: ./RhinoPackages.Web
        run: npm install

      - name: Generate Version Tag
        id: version
        run: echo "TAG_NAME=v$(date +'%Y.%m.%d').${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build with Next.js
        working-directory: ./RhinoPackages.Web
        env:
          NEXT_PUBLIC_VERSION: ${{ env.TAG_NAME }}
        run: npx next build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./RhinoPackages.Web/out

      - name: Zip Exported Site
        working-directory: ./RhinoPackages.Web
        run: zip -r ../site-export.zip out/


      - name: Create GitHub Release
        if: steps.detect-structural-changes.outputs.structural_changed == 'true'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "site-export.zip"
          tag: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          body: "Automatic deployment release of the static site."
          token: ${{ secrets.GITHUB_TOKEN }}
