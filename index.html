ovides a new framework for exploring quasicrystalline structures in architectural and design workflows.  \nTeam: Claire Djang and Stefano Arrighi, developed at Studio Olafur Eliasson"])</script><script>self.__next_f.push([1,"7:T4dd,"])</script><script>self.__next_f.push([1,"ArqiShap3D is a set of modelling and drafting tools for architecture workflows and is developed for Grasshopper. The current version of ArqiShap3D is far from finished and there is a lot to be added and (probably) many bugs to be corrected. If you wish to support the development of ArqiShap3D Tools, you can visit my Patreon page from this link: https://www.patreon.com/ArqiShap3D\nNew in v0.4.0 : New wall modelling tools are added. Although the new algorithm is more restrictive than the older version, this is much faster (more than x50 in some cases) and generally more reliable and probably covers most of the realistic wall connections. Some of the restrictions of this algorithm include:  *Works only on lines or polylines. (Curves can be input, but they will be converted to polylines.) *Works only on curves that are planar and parallel to XY plane. *Can't solve wall connections from a wall end to a wall body which are too close to a wall end. *If a segment at end disappeares during wall intersection, that intersection can't be solved. *Intersections between curve bodies (intersections where the intersection point on both of the curves are not at their ends) are also not solved.\nTutorials: https://www.youtube.com/@ofkurtarch5777"])</script><script>self.__next_f.push([1,"8:T514,"])</script><script>self.__next_f.push([1,"iJewel Viewer is a Rhino plugin designed specifically for 3D jewelry designers. It enhances the workflow for designers to interact and share their intricate jewelry models with their clients and fellow designers.\nKey Features:\n1.Experience seamless viewing of your 3D jewelry models directly within Rhino.\n2.Export your Rhino models directly to the iJewel Viewer.\n3.Provides different options within the viewer to rotate, zoom, and pan around your imported 3D model.\n4.Create and customize your own configurator using a predefined set of metal and gem libraries, applying selected materials to your models according to your preferences.\n5.Enhance your models further by applying different metal and gem environment maps available from the library.\n6.Adjust advanced settings like environment rotation and intensity to achieve the perfect look for your designs.\n7.Share your creations with clients, allowing them to view and interact with your designs in real-time, thereby providing an engaging experience.\n\nWe provide extensive tutorials and resources to help you get the most out of our tool:\n- Comprehensive Documentation: https://drive.google.com/file/d/1x-akxCNYMBeObWB44w75tarje8yH1kjq/view\n- Step-by-Step Video Tutorial: https://www.youtube.com/playlist?list=PLIWKi7kUUJPhTkW5fIgk3j3kJNWlJopei"])</script><script>self.__next_f.push([1,"9:T514,"])</script><script>self.__next_f.push([1,"iJewel Viewer is a Rhino plugin designed specifically for 3D jewelry designers. It enhances the workflow for designers to interact and share their intricate jewelry models with their clients and fellow designers.\nKey Features:\n1.Experience seamless viewing of your 3D jewelry models directly within Rhino.\n2.Export your Rhino models directly to the iJewel Viewer.\n3.Provides different options within the viewer to rotate, zoom, and pan around your imported 3D model.\n4.Create and customize your own configurator using a predefined set of metal and gem libraries, applying selected materials to your models according to your preferences.\n5.Enhance your models further by applying different metal and gem environment maps available from the library.\n6.Adjust advanced settings like environment rotation and intensity to achieve the perfect look for your designs.\n7.Share your creations with clients, allowing them to view and interact with your designs in real-time, thereby providing an engaging experience.\n\nWe provide extensive tutorials and resources to help you get the most out of our tool:\n- Comprehensive Documentation: https://drive.google.com/file/d/1x-akxCNYMBeObWB44w75tarje8yH1kjq/view\n- Step-by-Step Video Tutorial: https://www.youtube.com/playlist?list=PLIWKi7kUUJPhTkW5fIgk3j3kJNWlJopei"])</script><script>self.__next_f.push([1,"a:T52d,"])</script><script>self.__next_f.push([1,"Immediately set up a live, real-time visualization between Rhino and Lumion. Change the Rhino model’s shape and you’ll see these changes taking place, in real-time, in Lumion’s breathtaking, lifelike environment.\n\nAs you continue modeling in Rhino, you can simultaneously view your project in Lumion surrounded by an immersive, fully featured landscape (mountains, water, grass). Beautiful materials make the design 'pop', while photo-realistic lighting suddenly heightens your sense of environment, realism and depth.\n\nReal-time materials synchronization\nInstantly breathe life into your synced Rhino model by applying any of Lumion’s 1000+ high-definition materials in the Lumion editor. As you continue to develop the design, you can tweak the materials exactly to your liking and then save your material layouts for future rendering.\n\nLive point-of-view synchronization\nLiveSync now enables live point-of-view synchronization. Turn it on and immediately adopt the Rhino camera perspective, making your work easier, faster and more enjoyable.\n\nAutomatic model imports\nWhen establishing the LiveSync connection, Lumion will automatically import your Rhino model. Continue working on and modifying your project even after you turn off LiveSync, and easily save the file as an .LS for future rendering or development."])</script><script>self.__next_f.push([1,"b:T46c,"])</script><script>self.__next_f.push([1,"Parametric structural design plugin for Grasshopper 8 (Rhino 8+).\n\nThe Speckle Connector for Rhino 8 (v3) is OPTIONAL: MakeBuildingPro loads and works without it.\nIt is only needed for the Speckle one-way export (Comp_E06), which ships as a separate satellite\nplugin (MakeBuildingPro.Speckle.gha) that loads only when the connector is installed. To use\nSpeckle export, install the connector via the Package Manager (search \"Speckle\") and restart Rhino.\n\n- BIM data management with Excel / CSV / JSON round-trip\n- Irregular plans via void cut-outs (v5.7.0): cut: syntax, bay void toggle, consistency validation (L-shape / setback)\n- 3D model generation (columns, beams, walls, slabs, cantilevers, braces, posts)\n- Structural analysis model (centerline) + STBridge exporter (SS7 / SEIN / SNAP / Midas)\n- 2D structural plans and section drawings\n- AI Building Generator (OpenAI / Anthropic / Gemini) with Diff \u0026 Approval\n- Speckle one-way export (optional; requires the Speckle Connector for Rhino 8)\n- Bundled MCP server (Experimental) for Claude Desktop / Cursor / Cline\n\nSee README.md and the documentation site for setup and usage."])</script><script>self.__next_f.push([1,"c:T875,"])</script><script>self.__next_f.push([1,"AI-powered natural language to native Grasshopper scripts. Describe what you want and MANTIS plans it, then builds real components wired and ready on your canvas. v0.5.0 — a big speed + clarity release. LIVE STREAMING: the reasoning and the script appear as they generate instead of a frozen wait. ONE-CALL build: MANTIS reasons and builds in a single pass (no separate planning round-trip), roughly halving the time. IMAGE → PRECISE GEOMETRY: drop in a plan or elevation and MANTIS rebuilds it to scale as native Rhino geometry (it reads a dimension as the scale reference) — works on the no-API-key Claude CLI too. CLEAN STAGED LAYOUT: each stage gets its own non-overlapping group band, and clicking a plan step highlights and frames exactly that stage's components. FASTER ITERATION: \"add a facade\" / \"add floor slabs\" extend the existing graph far more efficiently. Plus reliability fixes (no group collapse on slider drag). v0.4.2 — fixes a plugin load failure (\"Error loading Mantis.Plugin.rhp\") on Rhino 8 by no longer bundling a conflicting System.Text.Json; the plugin now loads cleanly and opens from the Rhino \"Mantis\" command / Panels menu without loading Grasshopper until you build. v0.4.1 — more reliable name resolution: when MANTIS isn't confident a name matches a real component, it now repairs it instead of guessing (it no longer silently substitutes the wrong component). Plus internal quality tooling. v0.4.0 — MANTIS now PLANS before it builds (understands the request, lays out reasoned steps, then constructs it) and shows the plan as clickable steps that jump to the matching group on the canvas. Adds an expert knowledge layer (popular plugins + a Rhino command reference) and LOCAL learning — MANTIS remembers its own corrections and stops repeating them. Builds on v0.3.x (instant panel open, deferred Grasshopper load, rh8_0 install-on-every-Rhino-8, self-diagnosing panel), Ask mode, Custom Instructions, image-to-script, and the validate-repair loop that catches bad component names and out-of-range wires before they reach the canvas. Supports Claude, OpenAI, Gemini, OpenRouter, and Ollama (local vision models too)."])</script><script>self.__next_f.push([1,"d:T4b6,"])</script><script>self.__next_f.push([1,"This is a set of two Grasshopper components for fast computation of approximate minimal surfaces. NEW: Two Rhino commands \"MinSurfFromCircularBoundary\" and \"MinSurfFromTwoBoundaries\". Only for Rhino 7 on Windows 10 or 11, Rhino version 7.4 and above. Needs .NET Framework 4.8 Runtime installed from https://dotnet.microsoft.com/en-us/download/dotnet-framework/net48. The main functionality is in two grasshopper components. The first component \"fills\" a closed curve with a soap film, the second component \"fills\" a surface in between two closed surfaces, giving a topologically cylindrical surface. Often, on the first try the result has self-intersections, but this can often be repaired by adjusting the rotation angle and the flipping boolean - these are additional parameters of the components. The algorithm is fast: there is neither recursion nor solution of a linear-algebraic problem on a mesh. Instead, the algorithm solves three Laplacian equations on the the unit-disk - one for each of x, y, z - and then transfers these solutions into 3d space. If the resulting parametrized surface happened to be conformal, the result would be the correct minimal surface. Otherwise, it is an approximation."])</script><script>self.__next_f.push([1,"e:T845,"])</script><script>self.__next_f.push([1,"Create parametric web applications that under the hood run your grasshopper definitions. Effortlessly share these apps with your team or clients. Develop cloud-based tools for automating calculations, product designs, and entire workflows using Packhunt. Digitalize processes within your company or sell your solutions on Packhunt Marketplace.\n\nHow does it work? Use the Packhunt plugin to prepare your Grasshopper definitions for deployment in the cloud. Build professional web user interfaces for your grasshopper logic on Packhunt without any coding knowledge. Integrate with other applications hosted on the Packhunt platform to perform structural calculations, connect with environmental databases, or export results to other software packages. Safely give as many people as you want access to your app. Your IP is protected. The user of your app doesn't need to have any knowledge of Grasshopper.\n\nPricing. Try out all the functionalities of Packhunt **for free**. Packhunt pricing is pay-per-use - you only pay for the credits you use. Licence fees start at €49/month.\n\nSell your knowledge. You can sell your solutions via the Packhunt marketplace with your team and create new revenue streams from your knowledge. The Packhunt marketplace is catered to the building industry: computational designers, engineers, architects and building industry advisors.\n\nQuestions? Find our documentation (https://docs.packhunt.io/) and plugin installation instructions (https://docs.packhunt.io/packhunt_studio/get_started/install_plugin/) here.\nReady to start? Sign up (https://app.packhunt.io/sign-up) and check out our digital marketplace (https://app.packhunt.io/manage/marketplace) to find useful tools to design and construct your projects in the AEC \u0026 infrastructure industry. Contact us at support@packhunt.io for any questions about the platform.\n\n--CHANGELOG--\n1.10.0 - Add egress service component to plugin\n\n1.9.1 - Fix connectivity issues when using Digital services \n\n1.9.0 - Support Rhino 8 .NET Core runtime\n\n1.8.1 - Fix profile Dialog not reopening after close\n\n1.8.0 - Add Packhunt authentication dialog"])</script><script>self.__next_f.push([1,"f:T69e,"])</script><script>self.__next_f.push([1,"Rig is a framework for building parametric, interactive 3D models in Rhino using code. You write your model as plain C# in the IDE you already use (Visual Studio, VS Code), with all the tooling that comes with it, including syntax highlighting, autocompletion, refactoring, source control, and AI coding agents. Your geometry updates live in the Rhino viewport as you work.\n\nRig gives you the full power of a real programming language while keeping the immediate, visual feedback loop that makes parametric design enjoyable.\n\nRig Features\n\nComponent based. Build your model from small, self-contained components that compose into larger ones. Complex models stay organized as a tree of reusable pieces instead of one tangled definition.\n\nReactive at the core. Declare your values as signals and your geometry as computed expressions. Rig tracks what depends on what and re-evaluates only what changed. You never write update or invalidation code by hand.\n\nIntegrates with the Rhino document. Document objects are just another input to your model. Reference them as strongly-typed values instead of finding them by name, and when their geometry changes in Rhino, every part that depends on them updates automatically.\n\nInteractive user controls. Expose your parameters as sliders, numeric inputs, dropdowns, and color pickers in a dockable Rig panel. Drag a slider and the model responds immediately.\n\nLive by default. Edit your code, save, and the geometry rebuilds in Rhino instantly. Hot reload keeps Rhino open while you iterate, so there is no need to restart.\n\nBuilt on dependency injection. Components declare what they need as constructor parameters, and Rig wires them together for you."])</script><script>self.__next_f.push([1,"10:T4a0,"])</script><script>self.__next_f.push([1,"ShapeMap is a plugin for Grasshopper, developed by the McNeel Asia China team. It integrates multiple basic functions in Rhino and has undergone secondary development. This plugin allows users to map any curve texture designed on a plane onto the surfaces of complex 3D models, while minimizing or eliminating deformation of the texture curves on the 3D surfaces. With ShapeMap, designing textures on 3D model surfaces becomes much easier, and the operation process is intuitive and simple.\nSpecial emphasis, ShapeMap supports mapping texture curves onto polysurfaces (Brep) without being affected or constrained by the surface's UV direction. It enables the placement of complete, unified, and uniform texture curves across multiple connected surfaces. This resolves the long-standing limitation of traditional methods, which could not effectively apply textures across multiple surfaces.\nShapeMap is currently widely used in industries such as automotive design, product design, footwear design, and architectural design.\nThe sample file can be downloaded here: https://www.food4rhino.com/en/app/shapemap\nShapeMap is now built into Rhino 9. Please use the latest version in Rhino 9."])</script><script>self.__next_f.push([1,"11:T9bd,"])</script><script>self.__next_f.push([1,"An easy-to-use validated heat transfer solver on tetrahedral meshes, for energy engineering in Rhino3D 8 and 9 on Windows 10 or 11 or Mac, Rhino version 8.15 and above.\nUnlike other plugins for energy efficiency analysis, TRfem works fully volumetrically on a 3D tetrahedral mesh, and is extremely easy to use. Includes a tet mesh previewer, and example tet mesh, a cube tet mesh provide, and an isosurface solver. This is a companion plugin to TRmesh for tetrahedral meshing, but TRfem includes a number of tet meshing components that will usually suffice for real-world tasks.\nThe main solver component takes the following inputs:\n  - A Rhino quad mesh with each quad representing a tetrahedron.\n  - A list of tetrahedral references. At index j, it indicates the material that tetrahedron j belongs to. These are indices into the next parameter, the conductivities. If unsure, just provide {0} here and {1.0} for the conductivities.\n  - A list of conductivities. At index i, it contains the conductivity of material i,in Watt per meter and Kelvin. Typical value is 0.02 for insulation foam, and 2 for concrete. Length of the list is the number of different materials your tetrahedral mesh consists of. If unsure, just provide {1.0}, standing for one material of conductivity 1.0. If there is only one material, the value has no influence on the result, as expected.\n  - A list of vertex indices that are hot, for instance exposed to interior heated air. These are the heat sources.\n  - A list of vertex indices that are cold, for instance exposed to exterior cold air. These are the heat sinks. The resulting temperature field will have a gradient that goes from the cold to the hot vertices.\nNote that all other vertices are supposed to be exposed to a good insulator, for instance air that is not convective, such as air between walls. The resulting temperature field will have a gradient perpendicular to those boundary vertices, corresponding to absence of heat transfer in and out of these boundary patches. This is in accordance with the definition of a thermal bridge: \"A structural component with much higher conductivity than the surrounding components\". We therefore model the surrounding components as not receiving or emitting heat transfer at all.\nThe algorithm and implementation was reviewed and published in https://doi.org/10.3390/encyclopedia2020067. TRfem is fully EN ISO 10211:2017 and 10077:2017 compliant.\nIcons thanks to https://flaticon.com under attribution license."])</script><script>self.__next_f.push([1,"12:T1175,"])</script><script>self.__next_f.push([1,"To \"tween\" means to generate curves that interpolate _between_ given input curves. Often the problem is that the resulting curves overlap. Tweener solves that problem. This Grasshopper/Rhino plugin generates curves that interpolate between:\n \n  - either any number of closed planar curves, one of which is the outer one and emcompasses all others (This part of Tweener is called the \"planar Tweener\" even though there are also functions for extruding the curves to 3D), or between:\n\n  - two arbitrary, not necessarily closed input curves, on any constraint surface given by an input surface brep or surface mesh.\n   \nSee \"mathiasfuchs.com/TweenerExamples\" for official examples, and \"mathiasfuchs.com/tweenerhelp.html\" for the command reference. The resulting output curves are guaranteed not to cross each other or the input curves, no matter how complex your input is. Moreover, they are guaranteed to be smooth and parametrization-independent. The output is either the curves, or a mesh textured according to the tween gradient. Tweener curves are manipulated by their input curves, just the way usual curves are manipulated by their control points. Thus, Tweener can be thought of as introducing another modeling paradigm for curves.\nBoth the in-built Rhino and Grasshopper tweeners as well as a certain popular Grasshopper plugin don't leave the control-point paradigm for generating tween curves. As a result, the tween curves start to overlap quickly, as soon as the input becomes somewhat complex. In contrast, this package provides a tweening functionality whose emphasis on the mere curves' shapes is entirely independent on how the curve is controlled or parametrized. Since the tween curves don't cut each other or the input curves, Tweener lends itself specifically to applications such as general illustration, typography, 3d printing, layer design, CNC, landscape architecture etc - typically in landscapes, you don't want overhanging cliffs; likewise, a concrete printer usually has difficulties with excessive overhangs. There is a TweenerTopo component that allows to extrude planar tween curves to 3D in order to generate quality landscape isolines, allowing the user to provide an additional \"shape\" parameter that controls the convexity/concavity of the landscape.\nApart from landscape design, the planar Tweener lends itself for interior design where smooth guard curves steer people along the design language of your given interior - think Ikea, or think of the space between facade and core of a high-rise building.\nTweener is not limited to planar curves or simple extrusions of planar curves: it can tween between any two arbitrary, not necessarily closed curves, if there is a constraint surface as additional input. Tweener pulls the input curves back to the constraint surface and then generates curves between them, on the surface. Again, overlaps are guaranteed not to occur.\nMoreover, there is a powerful interactive TweenCurve editing environment that can be reached from the Rhino command line, including a \"Fish Eye effect\", and a way to drag the curves without disrupting the aesthetic and visual quality! Please watch the \"monkey face\" video on food4rhino to see what it does, and type \"TweenStartExample\" command to start an example editing environment.\nThis is an evaluation version, valid for some time. After your preview period expires, you can either prolong it, or purchase a Pro Tweener which offers: API access, output to NURBS curve, ability to be called from within scripts, and a high quality remeshing option.\nTweener is part of a series of geometrical finite element applications, aiming at enabling both tech-savvy and novice users to quickly prototype, and web-deploy parametric finite element applications to general geometric problems. Further examples of such applications include heat transfer, image registration, medial axis extraction, Poisson interpolation, and optimal transfer type problems, see \"https://mathiasfuchs.com/Tweeners\" for more info and examples.\nBy installing Tweener, you accept the privacy terms in \"mathiasfuchs.com/TweenerPrivacy.html\". This version is for Rhino 8.0.23304.9001 and above on Windows 10 or 11. There is also a Rhino 7 Windows version (for 7.15 and above) available on all three distribution channels: the package manager, on Food4rhino, and on https://mathiasfuchs.com/Tweeners.html. A Mac version for Rhino 7 and/or 8 on Mac is available on request, please drop me a line."])</script><script>self.__next_f.push([1,"13:Tb73,"])</script><script>self.__next_f.push([1,"WASPer_3DP is a Rhino 8 / Grasshopper plugin compatible with Design for Additive Manufacturing (DfAM)\nit enables computational design, digital fabrication, and performance-oriented development 3D-printed building components.\nIt began as a workflow for large-scale Liquid Deposition Modeling (LDM) and\nWASP40100-style clay printing, but has grown into a broader toolkit that connects\ngeometry processing, implicit fields, infill generation, slicing, robotic/printing\npath preparation, G-code workflows, material libraries, morphology, and building\nphysics inside one parametric environment.\n\nThe plugin is intended for researchers, architects, engineers, fabricators, and\nmakers working with additive manufacturing for architecture and construction.\nIt supports both design-to-fabrication workflows and analysis loops for\nperformance-driven facade systems, macro-porous elements, structured infills,\nthermal components, moisture-buffering prototypes, and material-aware building\nassemblies.\n\nMain capabilities include:\n- Planar, non-planar, and surface-aware slicing workflows for 3D-printing paths\n- 2D and 3D infill generation, including S-patterns, conformal paths, TPMS,\n  polyhedral/cellular systems, brick-like cavities, and custom SDF-based infills\n- Signed-distance-field tools for implicit geometry, trimming, booleans, offsets,\n  shells, contouring, meshing, and field-based path operations\n- Printing-path preparation, path optimization, curvature/proximity-based point\n  reduction, local flow estimation, extrusion planning, velocity utilities, and\n  path visualization\n- Marlin G-code generation and parsing for LDM/FDM workflows, currently focused\n  on 3-axis printer workflows, plus KUKA PRC helper components for robotic path\n  preview and command-plane preparation\n- Facade and panelization tools for UV-based panels, joints, weighted tile\n  layouts, and SDF-informed facade systems\n- Material and layer records for opaque/gas materials, equivalent conductivity,\n  water-content calculations, and reusable material/layer workflows\n- Morphological and performance characterization, including porosity, tortuosity,\n  surface area, printability proxies, shrinkage, and pore-flow relation metrics\n- Building-physics tools, including steady and dynamic analytical thermal solvers\n  based on ISO 6946 and ISO 13786, numerical conduction solvers, weather/solar\n  series generators, thermal-field visualization, adaptive comfort, structural\n  proxy checks, and moisture-buffering simulation tools\n- Native data-visualization, CSV/Excel/JSON utilities, Grasshopper document\n  inspection helpers, viewport/image export, and workflow automation utilities\n\nWASPer_3DP bridges design intent, geometric logic, fabrication constraints, and\nperformance analysis so experimental building components can move from parametric\nmodel to analyzed geometry, printable paths, and fabrication-ready machine code\nwithout leaving Grasshopper."])</script><script>self.__next_f.push([1,"14:T275e,"])</script><script>self.__next_f.push([1,"Claude Code terminal docked in Rhino - the official CLI on your own subscription, no API keys.\nBuilt from: embedded Chromium (CefSharp) + xterm terminal UI; Python PTY sidecar; per-project\nworkspaces with multi-chat registry and persistent memory; skill quick-invoke buttons and\ncontext-plugin presets; first-run setup wizard; clean uninstall command (RobochatUninstall).\n0.5.2: changing the model on a brand-new chat now works right away. Before, if you opened a fresh chat\nand picked a different model before the chat had finished starting up, the change was silently dropped\n(you had to nudge the effort first, or flip to the terminal view and back, to make it take). Now the\nmodel change waits for the chat to be ready and then applies on its own.\n0.5.1: Robohopper's skills now travel inside the Robohopper plugin itself, and Robochat keeps your\nworking folder's copies in sync automatically - version-aware, and it never overwrites a skill you\nhave edited (it flags it and offers an explicit Update instead). A Robohopper update is now announced\nthe same way a Robochat update is - one small popup with a \"don't show again\" option - and only when\nRobohopper is actually installed, so it is never noise. If Robochat and Robohopper both have an update,\nthe two notices never overlap: you see one at a time.\n0.5.0: model and effort now change reliably from the menu. They used to relaunch the chat with a\nlaunch flag, which Claude Code ignores when it resumes a session, so the menu change silently did\nnothing (you set high, it drifted back). Now the menu sends the native in-session command, exactly\nwhat typing /model or /effort in the terminal does, and it sticks. The model label follows Claude's\nreal current model instead of the one you requested, so it can no longer show a model you are not on.\n0.4.25: the extra \"auto\" button introduced in 0.4.24 is removed - the permission row is back to\nthe one gesture you know: click the name, the mode advances. Being in auto is now shown by the\npermission button itself lighting up (accent colour, white text) while the session really runs\nin auto - no separate switch, nothing that is sometimes not clickable. On models where Claude\nCode does not offer auto (currently Haiku: it answers \"auto mode unavailable for this model\"\nand falls back to asking), the row simply shows the real mode, with the reason in the tooltip.\n0.4.24: the permission row now tells the truth about \"auto\" at a glance - the permission button\nlights up (accent colour, white text) while the session really runs in auto, and a small \"auto\"\nbutton appears next to it ONLY when pressing it does something: one click brings the same chat\nback into auto in a few seconds (conversation kept), whatever Claude Code does to the Shift+Tab\ncycle. On models where Claude Code does not offer auto at all (currently Haiku: it answers\n\"auto mode unavailable for this model\" and falls back to asking), Robochat now shows the real\nmode instead of a stale \"auto\", and the auto button stays out of the way until you switch back\nto a model that supports it.\n0.4.23: model and effort switching is rebuilt to be deterministic - picking from the dropdown\nrelaunches the same chat with your choice as a launch flag (a few seconds, conversation kept)\ninstead of remote-driving Claude Code's terminal picker, which the latest Claude Code made\nunreliable by design; your model choice now sticks per chat. Claude's interactive questions\n(with option previews) render fully and are clickable again; chats with skill toggles no longer\nall share the same name; surface cards follow what is REALLY on screen, so they no longer vanish\nor appear late. Calibrated for Claude Code 2.1.207.\n0.4.22: rolls back the 0.4.20 and 0.4.21 changes - they introduced instability on new chats\nin live use. This release is functionally identical to 0.4.19 (the reworked native permission\ncontrol is kept). If you are on 0.4.20 or 0.4.21, please update.\n0.4.19: the auto switch on the permission row is removed - every new chat already starts in\nauto, so the permission row is back to a single clean control: click the name to step the mode.\n0.4.18: the auto switch on the permission row is now a labelled slide toggle (same style as the\nplugin switches, with a tooltip) - the bare dot introduced in 0.4.17 did not read as a control.\n0.4.17: the permission control is native and reliable again on the latest Claude Code (2.1.206\nremoved \"auto\" from the Shift+Tab cycle and made it silent, which broke the old popup by\ndesign): clicking \"permission\" in the dropdown now steps the real mode one press at a time and\nthe menu STAYS OPEN while you cycle; a new \"auto\" knob on the same row switches auto back on by\nseamlessly restarting the same chat (a few seconds, conversation kept). The mode label never\nlies anymore (it used to show \"ask\" while in auto), the switch is refused instead of losing\ntext you typed but did not send, and the old permission popup is gone.\n0.4.16: switching ON any plugin skill now switches the plugin itself ON automatically - the\nplugin's core context always travels with its members (before, a member armed while the plugin\nmaster was off was silently ignored at send, with no feedback). Works for every plugin, current\nand future. Also: the setup wizard's window dragging now binds late (groundwork for the\nupcoming Mac flavour); Windows behaviour unchanged.\n0.4.15: every control click now lands - permission, effort, model, skill buttons and popup\ncards queue their action and run it the moment the terminal is ready (a click during startup\nused to die silently: buttons looked dead on a brand-new chat). A waiting click shows a visible\n\"waiting for the terminal\" state, double-clicks never fire twice, and switching chat clears\nstale actions. Claude Code's new MCP-consent startup dialog is now a proper clickable card\n(Confirm all / Reject all). The update popup title narrates the phase (Updating... then\nUpdated, have fun!).\n0.4.14: two toggle-reliability fixes - a default-on plugin toggle can no longer arm ITSELF\nmid-chat (a deficient state refresh silently re-armed it between two sends; toggles now only\nauto-arm at the start of a brand-new chat, and switching them off always sticks); and sending a\nmessage with armed toggles no longer shows a false \"Message not sent - text restored\" banner 10\nseconds later (the delivery receipt now tracks the message itself, so the \"skills loaded\"\nconfirmation works again and the banner only appears when a message is REALLY lost).\n0.4.13: reliability pass - your plugin toggles no longer reset by themselves while Grasshopper is\nrunning (a background refresh was silently reverting them); an uninstalled plugin no longer shows up\n(or self-arms) in the toggle bar; the effort level you pick now STICKS across chat switches and\nrestarts (it silently fell back to medium); the permission popup follows the new Claude Code mode\ncycle (auto / ask / accept edits / plan), its buttons respond reliably, and if a mode can't be\nreached it shows where you really are instead of dying silently.\n0.4.12: the \"plugin\" list now shows from the start (even before a catalog is built) and fills in LIVE as\na plugin vendor prints its catalog - no Rhino restart needed to see new plugins; and the plugin toggles in\nthe grid panel are now reliably clickable.\n0.4.11: if Claude Code isn't installed, Robochat no longer fails silently - a clear blocking window asks\nyou to install it (one button runs the official installer) and clears itself the moment Claude is ready.\n0.4.10: sign-in is now reliable end to end - when Claude reports \"signed in, press Enter\", Robochat\nfinishes it for you and shows a clear \"Signed in\" card instead of a false \"closed\" message. A new chat\ninherits the last-viewed chat's setup instantly (before you type): promoted skills and packages, their\norder, and armed toggles.\n0.4.9: the taskbar keeps items in the order you added them (oldest left), so you can organise the space;\na brand-new chat inherits the previous chat's whole setup - promoted skills and packages, their order,\nand armed toggles (a frozen skill comes back armed).\n0.4.8: the plugin list is now a grid panel that opens over the chat (no more clipping), scrolls with the\napp's own thin scrollbar, and keeps its place while you flip toggles; an armed plugin lights the accent\ncolour. A brand-new chat inherits the previous chat's manager setup (same toggles, same taskbar) instead\nof starting blank.\n0.4.7: a \"plugin\" list next to the skill toggles - every Grasshopper plugin on your machine becomes\na per-plugin skill you can switch on (all off by default); suite plugins show as plain toggles, no\nnested menu; sign-in is even more robust (the code is ferried straight to the sign-in prompt, never\nthe chat); Claude Code auto-install is hardened (no hang, no orphan, longer timeout for slow links).\n0.4.6: sign-in made solid (the pasted code now reaches the sign-in prompt from the card AND the\nmessage box; the browser comes to the front; a clear Retry card when the sign-in window closes;\na subtle loading dot while sign-in prepares); window Floating/Tab setting no longer shows a stale\nchoice; setup polish (Finish hides while installing).\n0.4.5: guided sign-in card (one click opens the browser, one box pastes the code - both Claude\naccount and Console paths); wizard-return fix after updating from older versions. 0.4.4: setup\nwizard returns after an uninstall (onboarding tied to the installation); \"Update\ncatalog\" manager button (regenerates a vendor's component catalog only when it lags the live\nGrasshopper census); Claude-version notice fully silent. 0.4.3: new icon everywhere; one-shot\nsuite markers (fixes cross-app wizard inhibition) + live cwd channel + dock choice via marker;\nRobino capability; skill-preset popup with instant pill feedback\nand auto-promotion of newly deposited suite plugins; 3-tier skill manager colors; clean single\nbubble for sends with armed skills. 0.4.2: suite skill-plugins visible from chat start with\nonce-per-chat send memory (re-arms after compaction), live workspace marker for suite members."])</script><script>self.__next_f.push([1,"15:T56f,"])</script><script>self.__next_f.push([1,"Rhino-side bridge for Almond, an MCP server that lets Claude (or any MCP client) drive Rhino 8. This plugin listens on 127.0.0.1:5000 (local only) and starts automatically with Rhino; commands AlmondMCPStart / AlmondMCPStop / AlmondMCPStatus control it manually.\nCapabilities: compiles and runs C# RhinoCommon scripts sent by the server; runs Grasshopper definitions headlessly; imports curated furniture and drawing assets as block instances; applies drawing-style layer recipes (plot weights, linetypes); exports selected objects as GLB; runs Karamba3D structural checks when Karamba 3.1 is installed (bound at runtime via reflection - Karamba is never bundled).\nThis package contains NO 3D models. The Almond furniture and drawing libraries ship as metadata manifests only (product dimensions, spatial contracts, source URLs, checksums); each user downloads the model files from their original 3D Warehouse pages with \"almond-mcp fetch-assets\", which verifies checksums. Not affiliated with Inter IKEA Systems, Trimble, or Karamba3D GmbH.\nREQUIRED SETUP beyond this plugin: install uv (docs.astral.sh/uv), add {\"command\": \"uvx\", \"args\": [\"almond-mcp\"]} as an MCP server in your Claude Desktop or Claude Code config, restart Claude, then optionally run \"uvx almond-mcp fetch-assets --open\" for the asset libraries and \"uvx almond-mcp doctor\" to verify. Full guide in the repository README."])</script><script>self.__next_
